# =============================================
# CI/CD Pipeline for Streamlit DevOps Demo
# Deploys to Azure App Service via GHCR
# =============================================

name: CI/CD Pipeline

# ====== WHEN to run ======
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ====== Environment Variables ======
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/streamlit-app

# ====== JOBS ======
jobs:
  # =========================================
  # JOB 1: Run Tests
  # =========================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🧪 Run pytest with coverage
        run: |
          pytest --cov=app --cov-report=term --cov-report=xml
      
      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # =========================================
  # JOB 2: Build & Push Docker Image
  # =========================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🏷️ Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}
      
      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # JOB 3: Deploy to Azure App Service 🚀
  # =========================================
  deploy-to-azure:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment:
      name: production
    
    steps:
      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: 🔄 Restart Web App
        run: |
          az webapp restart \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group $(az webapp show --name ${{ secrets.AZURE_WEBAPP_NAME }} --query resourceGroup -o tsv)
      
      - name: ✅ Deployment Success
        run: |
          echo "🎉 Deployed to Azure!"
          echo "🌐 URL: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
      
      - name: 🧹 Logout
        run: az logout
        if: always()

  # =========================================
  # JOB 4: Deployment Summary
  # =========================================
  deploy-info:
    name: 📢 Deployment Summary
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy-to-azure]
    if: always() && github.event_name == 'push'
    
    steps:
      - name: ✅ Pipeline Success
        run: |
          echo "🎉 Pipeline completed successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🌐 Live App: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 By: ${{ github.actor }}"
      
      - name: 📊 Create Summary
        run: |
          echo "## 🚀 Full Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Azure Deploy | ${{ needs.deploy-to-azure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- **🌐 Live App:** https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "- **📦 Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **📝 Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **👤 Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY